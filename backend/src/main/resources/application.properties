spring.application.name=splitwise-backend

# MongoDB configuration (adjust URI for your environment)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/splitwise}

# Server configuration
server.port=${PORT:8080}

# Default currency
app.default-currency=INR

# Firebase service account JSON (paste entire JSON string into env var)
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}

# JWT configuration (must set JWT_SECRET env var in production)
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# CORS allowed origins (comma-separated, set to your frontend URL in production)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

